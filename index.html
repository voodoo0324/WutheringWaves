<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>漂泊者成就手冊 - 鳴潮成就記錄工具</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            -webkit-tap-highlight-color: transparent; /* 消除手機點擊高亮 */
        }
        /* 隱藏滾動條但保持滾動功能 (用於手機分類/子分類滑動) */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 訂製極窄與科技微光滾動條 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
            border-radius: 9999px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(56, 189, 248, 0.15);
            border-radius: 9999px;
            border: 1px solid transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(56, 189, 248, 0.45);
        }
        
        .card-glow:hover {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.12);
        }
        /* 提升觸控時的反饋效果 */
        .active-press:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body class="min-h-screen pb-24 lg:pb-12 overflow-y-auto">

    <!-- 頂部導覽列 -->
    <header class="border-b border-gray-800 bg-gray-900/90 backdrop-blur sticky top-0 z-40 px-4 py-3 sm:py-4">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-3 sm:gap-4">
            <div class="flex items-center gap-3 self-start md:self-auto">
                <div class="p-2 bg-sky-500/10 rounded-xl text-sky-400">
                    <i data-lucide="trophy" class="w-6 h-6 sm:w-7 sm:h-7"></i>
                </div>
                <div>
                    <h1 class="text-lg sm:text-xl font-bold tracking-wider flex items-center gap-1.5">
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-400">漂泊者成就手冊</span>
                        <span class="text-[10px] sm:text-xs font-semibold text-sky-400 bg-sky-500/10 px-1.5 py-0.5 rounded border border-sky-500/20 shadow-sm shadow-sky-500/5">v3.4版</span>
                    </h1>
                    <p class="text-[10px] sm:text-xs text-gray-400">鳴潮 (Wuthering Waves) 手機/電腦雙端同步記錄</p>
                </div>
            </div>
            
            <!-- 總進度條 -->
            <div class="w-full md:w-80 bg-gray-950 p-3 rounded-xl border border-gray-850">
                <div class="flex justify-between text-xs mb-1">
                    <span class="text-gray-400 flex items-center gap-1">
                        <i data-lucide="trending-up" class="w-3.5 h-3.5 text-sky-400"></i> 全局進度
                    </span>
                    <span id="global-progress-text" class="font-bold text-sky-400 font-mono">0% (0/0)</span>
                </div>
                <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden">
                    <div id="global-progress-bar" class="bg-gradient-to-r from-sky-400 to-indigo-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <div class="flex justify-between items-center mt-1.5 text-[10px] text-gray-500">
                    <span id="total-astrite-gained" class="flex items-center gap-1 font-medium">
                        <i data-lucide="sparkles" class="w-3 h-3 text-amber-400"></i> 已拿星聲: 0
                    </span>
                    <span id="total-astrite-remaining" class="font-medium">未拿星聲: 0</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="max-w-6xl mx-auto px-4 mt-4 sm:mt-6">
        
        <!-- 頂部操作列：搜尋、篩選、工具選單 -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-3 mb-4 sm:mb-6">
            <!-- 搜尋框 -->
            <div class="md:col-span-5 relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                    <i data-lucide="search" class="w-4 h-4"></i>
                </span>
                <input type="text" id="search-input" placeholder="全域搜尋成就名稱、達成條件、星聲..." 
                       class="w-full pl-9 pr-4 py-2.5 bg-gray-900 border border-gray-800 rounded-xl focus:outline-none focus:border-sky-500 text-sm text-gray-200 placeholder-gray-500 transition-colors">
            </div>

            <!-- 篩選按鈕組 (已完成/未完成) -->
            <div class="md:col-span-4 flex bg-gray-900 p-1 rounded-xl border border-gray-800">
                <button onclick="setFilter('all')" id="filter-all" class="flex-1 py-1.5 text-xs font-semibold rounded-lg transition-all active-press bg-sky-500/10 text-sky-400">
                    全部
                </button>
                <button onclick="setFilter('completed')" id="filter-completed" class="flex-1 py-1.5 text-xs font-semibold rounded-lg transition-all active-press text-gray-400 hover:text-gray-200">
                    已完成
                </button>
                <button onclick="setFilter('incomplete')" id="filter-incomplete" class="flex-1 py-1.5 text-xs font-semibold rounded-lg transition-all active-press text-gray-400 hover:text-gray-200">
                    未完成
                </button>
            </div>

            <!-- 工具功能與電腦版新增按鈕 -->
            <div class="md:col-span-3 flex gap-2">
                <!-- 只在電腦版顯示的按鈕 -->
                <button onclick="openAddModal()" class="hidden lg:flex flex-1 py-2.5 bg-gradient-to-r from-sky-500 to-indigo-650 hover:from-sky-400 hover:to-indigo-550 text-white rounded-xl text-xs font-bold items-center justify-center gap-1.5 transition-all shadow-lg shadow-sky-500/10 active-press">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> 新增自訂成就
                </button>
            </div>
        </div>

        <!-- 分類與列表主體區 -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 lg:gap-6 items-start">
            
            <!-- 雙直列選單控制台：左邊主選單、右邊子選單，均為上下滑動 -->
            <aside class="lg:col-span-4 lg:sticky lg:top-24 z-20">
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center px-2">
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">大類分區</p>
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">子分區清單</p>
                    </div>
                    <!-- 雙直列滾動面板 -->
                    <div class="flex w-full h-64 sm:h-72 lg:h-[500px] bg-gray-950/80 border border-gray-850 rounded-2xl overflow-hidden shadow-2xl">
                        <!-- 左側：主選單 -->
                        <div id="category-list" class="w-5/12 border-r border-gray-850 h-full overflow-y-auto no-scrollbar p-2 space-y-1.5 bg-gray-950/40">
                            <!-- 由 JS 動態生成 -->
                        </div>
                        <!-- 右側：子選單 -->
                        <div id="sub-category-list" class="w-7/12 h-full overflow-y-auto no-scrollbar p-2 space-y-1.5">
                            <!-- 由 JS 動態生成 -->
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 右側成就清單 -->
            <section class="lg:col-span-8 space-y-3 sm:space-y-4">
                
                <!-- 當前選取分類摘要 -->
                <div class="bg-gray-900/50 border border-gray-850 rounded-2xl p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                    <div>
                        <h2 id="current-category-title" class="text-base sm:text-lg font-bold text-gray-100 flex items-center gap-2">
                            載入中...
                        </h2>
                        <p id="current-category-desc" class="text-[11px] sm:text-xs text-gray-400 mt-1">
                            載入中...
                        </p>
                    </div>
                    <div class="flex items-center justify-between sm:justify-start gap-3 border-t border-gray-800/60 pt-2 sm:pt-0 sm:border-0">
                        <div class="text-left sm:text-right">
                            <div class="text-[9px] text-gray-500 uppercase tracking-wider">該分區進度</div>
                            <div id="category-progress-text" class="text-xs sm:text-sm font-bold text-sky-400 font-mono">0 / 0</div>
                        </div>
                        <div class="w-24 bg-gray-850 h-1.5 rounded-full overflow-hidden">
                            <div id="category-progress-bar" class="bg-sky-400 h-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- 成就列表容器 -->
                <div id="achievements-container" class="space-y-2.5 sm:space-y-3 max-h-[420px] sm:max-h-[500px] lg:max-h-[600px] overflow-y-auto pr-1.5 custom-scrollbar">
                    <!-- 成就項目動態生成 -->
                </div>

                <!-- 空狀態提示 -->
                <div id="empty-state" class="hidden flex-col items-center justify-center py-12 text-center bg-gray-900/10 border border-dashed border-gray-800 rounded-2xl">
                    <i data-lucide="search-code" class="w-10 h-10 text-gray-600 mb-2"></i>
                    <p class="text-gray-400 text-sm font-medium">沒有匹配的成就項目</p>
                    <p class="text-xs text-gray-500 mt-0.5">換個關鍵字搜尋，或試試看別的篩選器吧！</p>
                </div>
            </section>

        </div>
    </main>

    <!-- 備份與設定懸浮按鈕 (FAB) - 設置在左下角 -->
    <div class="fixed bottom-6 left-6 z-40">
        <button onclick="toggleUtilityMenu()" class="w-14 h-14 bg-gray-900 border border-gray-800 hover:bg-gray-850 text-gray-400 hover:text-gray-200 rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-all focus:outline-none relative" title="資料備份與設定">
            <i data-lucide="settings" class="w-7 h-7"></i>
        </button>
        <!-- 下拉/上彈工具選單 -->
        <div id="utility-menu" class="hidden absolute left-0 bottom-16 mb-2 w-48 bg-gray-900 border border-gray-800 rounded-xl shadow-2xl p-1 z-30">
            <button onclick="exportData()" class="w-full text-left px-3 py-2.5 text-xs text-gray-300 hover:bg-gray-800 rounded-lg flex items-center gap-2">
                <i data-lucide="download" class="w-4 h-4 text-emerald-400"></i> 導出備份 (JSON)
            </button>
            <button onclick="triggerImport()" class="w-full text-left px-3 py-2.5 text-xs text-gray-300 hover:bg-gray-800 rounded-lg flex items-center gap-2">
                <i data-lucide="upload" class="w-4 h-4 text-sky-400"></i> 匯入備份
            </button>
            <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
            <div class="border-t border-gray-800 my-1"></div>
            <button onclick="openConfirmModal()" class="w-full text-left px-3 py-2.5 text-xs text-rose-400 hover:bg-rose-950/20 rounded-lg flex items-center gap-2">
                <i data-lucide="trash-2" class="w-4 h-4 text-rose-400"></i> 清除所有紀錄
            </button>
        </div>
    </div>

    <!-- 手機版專屬：右下角懸浮按鈕 (FAB) -->
    <button onclick="openAddModal()" class="lg:hidden fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-tr from-sky-500 to-indigo-600 text-white rounded-full flex items-center justify-center shadow-2xl shadow-sky-500/30 active:scale-90 transition-all z-40 focus:outline-none" title="新增成就">
        <i data-lucide="plus" class="w-7 h-7"></i>
    </button>

    <!-- 彈出視窗 1：新增自訂成就 Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 rounded-2xl max-w-md w-full overflow-hidden shadow-2xl">
            <div class="px-5 py-4 border-b border-gray-850 flex items-center justify-between">
                <h3 class="font-bold text-sm sm:text-base text-gray-100 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="text-sky-400 w-5 h-5"></i> 新增自訂成就
                </h3>
                <button onclick="closeAddModal()" class="p-1 text-gray-400 hover:text-gray-200 hover:bg-gray-800 rounded-lg transition-all">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="add-achievement-form" onsubmit="saveCustomAchievement(event)" class="p-5 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1.5">成就名稱 <span class="text-rose-450">*</span></label>
                    <input type="text" id="custom-title" required placeholder="輸入自定義成就名稱" 
                           class="w-full px-3 py-2.5 bg-gray-950 border border-gray-800 rounded-lg text-sm text-gray-200 focus:outline-none focus:border-sky-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1.5">成就條件與描述</label>
                    <textarea id="custom-description" rows="2" placeholder="詳細描述如何取得此成就..." 
                              class="w-full px-3 py-2.5 bg-gray-950 border border-gray-800 rounded-lg text-sm text-gray-200 focus:outline-none focus:border-sky-500"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-1.5">獲得星聲</label>
                        <select id="custom-reward" class="w-full px-3 py-2.5 bg-gray-950 border border-gray-800 rounded-lg text-sm text-gray-300 focus:outline-none focus:border-sky-500">
                            <option value="5">5 星聲</option>
                            <option value="10" selected>10 星聲</option>
                            <option value="20">20 星聲</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-1.5">大類歸屬</label>
                        <select id="custom-category" onchange="onModalCategoryChange()" class="w-full px-3 py-2.5 bg-gray-950 border border-gray-800 rounded-lg text-sm text-gray-300 focus:outline-none focus:border-sky-500">
                            <!-- JS 動態填充 -->
                        </select>
                    </div>
                </div>
                
                <!-- 動態顯示：大類對應子類選單 -->
                <div id="custom-subcat-wrapper" class="hidden">
                    <label class="block text-xs font-semibold text-gray-400 mb-1.5">子分區歸屬</label>
                    <select id="custom-subcategory" class="w-full px-3 py-2.5 bg-gray-950 border border-gray-800 rounded-lg text-sm text-gray-200 focus:outline-none focus:border-sky-500">
                        <!-- JS 動態填充 -->
                    </select>
                </div>

                <div class="pt-2 flex justify-end gap-2.5">
                    <button type="button" onclick="closeAddModal()" class="px-4 py-2.5 bg-gray-800 hover:bg-gray-750 text-gray-300 rounded-lg text-xs font-semibold">
                        取消
                    </button>
                    <button type="submit" class="px-5 py-2.5 bg-sky-500 hover:bg-sky-400 text-white rounded-lg text-xs font-bold active-press">
                        儲存成就
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 彈出視窗 2：自訂確認 Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 rounded-2xl max-w-sm w-full overflow-hidden shadow-2xl p-6 space-y-4">
            <div class="flex items-center gap-3 text-rose-500">
                <i data-lucide="alert-triangle" class="w-6 h-6 shrink-0"></i>
                <h3 class="font-bold text-lg text-gray-100">確定重置手冊？</h3>
            </div>
            <p class="text-xs text-gray-400 leading-relaxed">
                此操作將會清空您所有的成就達成記錄、以及您親自新增的「自定義成就」。該過程不可逆轉，您確定要重置嗎？
            </p>
            <div class="flex justify-end gap-3 pt-2">
                <button onclick="closeConfirmModal()" class="px-4 py-2.5 bg-gray-800 hover:bg-gray-750 text-gray-300 rounded-lg text-xs font-semibold">
                    取消
                </button>
                <button onclick="executeReset()" class="px-4 py-2.5 bg-rose-600 hover:bg-rose-500 text-white rounded-lg text-xs font-bold active-press">
                    確定清除
                </button>
            </div>
        </div>
    </div>

    <!-- 系統頂部動畫通知 -->
    <div id="custom-alert" class="hidden fixed top-6 right-4 left-4 sm:left-auto max-w-sm sm:w-80 bg-gray-900/95 border border-gray-800 text-gray-200 px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 z-50 transition-all duration-300">
        <span id="alert-icon-container" class="shrink-0">
            <!-- 動態圖示 -->
        </span>
        <span id="alert-message" class="text-xs font-semibold">提示訊息</span>
    </div>

    <!-- 資料預設與大類子類樹狀資料 -->
    <script>
        // 大分類結構
        const DEFAULT_CATEGORIES = [
            { id: "sol3", name: "索拉漫行", desc: "大世界探索、解鎖信標、尋物與攀爬探索度成就", icon: "compass" },
            { id: "journey", name: "長路留跡", desc: "主線任務、紀實劇情與大世界隱藏逸聞成就", icon: "book-open" },
            { id: "combat", name: "鏗鏘刃鳴", desc: "戰鬥技巧、強敵首領擊殺與逆境深塔挑戰成就", icon: "swords" },
            { id: "echo", name: "諸音聲軌", desc: "聲骸收集、終端等級、合鳴共鳴組合相關成就", icon: "database" }
        ];

        // 四大主類別對應的所有二級子選單
        const SUB_CATEGORIES = {
            sol3: [
                { id: "sol3_lands_huanglong", name: "索拉的大地·瑝瓏" },
                { id: "sol3_foot_huanglong_1", name: "瑝瓏的足跡·一" },
                { id: "sol3_foot_huanglong_2", name: "瑝瓏的足跡·二" },
                { id: "sol3_foot_blackshores_1", name: "黑海岸的足跡·一" },
                { id: "sol3_lands_rinascita", name: "索拉的大地·黎那汐塔" },
                { id: "sol3_foot_rinascita_1", name: "黎那汐塔的足跡·一" },
                { id: "sol3_foot_rinascita_2", name: "黎那汐塔的足跡·二" },
                { id: "sol3_foot_rinascita_3", name: "黎那汐塔的足跡·三" },
                { id: "sol3_wild_call", name: "荒野的呼喚" },
                { id: "sol3_lands_lahairo", name: "索拉的大地·拉海洛" },
                { id: "sol3_foot_lahairo_1", name: "拉海洛的足跡·一" },
                { id: "sol3_lands_royice", name: "索拉的大地·羅伊冰原" },
                { id: "sol3_lands_darkfell", name: "索拉的大地·黯原" }
            ],
            journey: [
                { id: "journey_drift_1", name: "漂泊之旅·一" },
                { id: "journey_drift_2", name: "漂泊之旅·二" },
                { id: "journey_drift_3", name: "漂泊之旅·三" },
                { id: "journey_imprint", name: "與你的印跡" },
                { id: "journey_world_1", name: "世間百態·一" },
                { id: "journey_world_2", name: "世間百態·二" }
            ],
            combat: [
                { id: "combat_memory", name: "戰鬥的記憶" },
                { id: "combat_tower_1", name: "來自深塔·一" },
                { id: "combat_tower_2", name: "來自深塔·二" },
                { id: "combat_tower_3", name: "來自深塔·三" },
                { id: "combat_skill_1", name: "戰鬥的技巧·一" },
                { id: "combat_skill_2", name: "戰鬥的技巧·二" },
                { id: "combat_skill_3", name: "戰鬥的技巧·三" },
                { id: "combat_skill_4", name: "戰鬥的技巧·四" },
                { id: "combat_skill_5", name: "戰鬥的技巧·五" },
                { id: "combat_echo", name: "戰鬥的迴響" },
                { id: "combat_surprise", name: "意外體驗" }
            ],
            echo: [
                { id: "echo_growth", name: "成長之路" },
                { id: "echo_friendship", name: "別域的友誼" },
                { id: "echo_data", name: "聲骸數據" },
                { id: "echo_tide", name: "潮汐萬象" }
            ]
        };

        // 預設經典成就數據庫
        const DEFAULT_ACHIEVEMENTS = [
            // === 索拉漫行 (sol3) ===
            // --- 索拉的大地·瑝瓏 ---
            { 
                id: "s_huang_voice_of_past", 
                cat: "sol3", 
                subcat: "sol3_lands_huanglong", 
                title: "往日之音·今州", 
                desc: "向陳皮交付30個聲匣。", 
                reward: 5,               
                stages: [

    <!-- 邏輯處理與狀態管理 -->
    <script>
        let achievements = [];
        // completedIds 結構：
        // 若為一般成就：存入字串 "id"
        // 若為多階段成就：存入物件 { id: "id", currentStage: 0 } 
        // 若為二選一分支成就：存入物件 { id: "id", selectedBranch: 0/1 }
        let completedIds = []; 
        
        // 預設進入點：索拉漫行 -> 索拉的大地·瑝瓏
        let currentCategory = "sol3";
        let currentSubCategory = "sol3_lands_huanglong"; 
        let currentFilter = "all";
        let searchQuery = "";

        window.addEventListener('DOMContentLoaded', () => {
            loadState();
            renderCategories();
            renderSubCategories();
            renderAchievements();
            updateProgress();
            populateCategorySelect();
            lucide.createIcons();
        });

        function loadState() {
            const savedCompleted = localStorage.getItem('ww_completed_achievements');
            const savedCustom = localStorage.getItem('ww_custom_achievements');
            completedIds = savedCompleted ? JSON.parse(savedCompleted) : [];
            let customAchievements = savedCustom ? JSON.parse(savedCustom) : [];
            achievements = [...DEFAULT_ACHIEVEMENTS, ...customAchievements];
        }

        function saveState() {
            localStorage.setItem('ww_completed_achievements', JSON.stringify(completedIds));
            const customOnly = achievements.filter(a => !DEFAULT_ACHIEVEMENTS.some(da => da.id === a.id));
            localStorage.setItem('ww_custom_achievements', JSON.stringify(customOnly));
            updateProgress();
        }

        // 獲取某成就當前的完成階段索引 (-1代表未開始/未完成，0代表完成階段1，1代表完成階段2...)
        function getAchievementStageIndex(id) {
            const record = completedIds.find(x => x === id || (x && x.id === id));
            if (!record) return -1;
            if (typeof record === 'string') return 0; // 舊有/無階段成就，預設為完成(相當於階段1)
            return record.currentStage !== undefined ? record.currentStage : -1;
        }

        // 獲取二選一分支成就當前選取的分支索引 (-1代表未選取，0代表分支A，1代表分支B)
        function getSelectedBranchIndex(id) {
            const record = completedIds.find(x => x && x.id === id);
            if (!record || record.selectedBranch === undefined) return -1;
            return record.selectedBranch;
        }

        // 判定該成就當前是否已「完全通關 / 結束」
        function isAchievementFullyCompleted(ach) {
            if (ach.branches && ach.branches.length > 0) {
                return getSelectedBranchIndex(ach.id) !== -1;
            }
            const stageIdx = getAchievementStageIndex(ach.id);
            if (stageIdx === -1) return false;
            
            // 如果是多階段成就，需完成到最後一階段 (最後一階 index 為 stages.length - 1)
            if (ach.stages && ach.stages.length > 0) {
                return stageIdx >= ach.stages.length - 1;
            }
            return true; // 一般成就只要有紀錄即算完全通關
        }

        // 計算某個成就所貢獻的進度點數
        function getAchievementPoints(ach) {
            if (ach.branches && ach.branches.length > 0) {
                return getSelectedBranchIndex(ach.id) !== -1 ? 1 : 0;
            }
            const stageIdx = getAchievementStageIndex(ach.id);
            if (stageIdx === -1) return 0;
            if (ach.stages && ach.stages.length > 0) {
                return stageIdx + 1; // 完成到第幾階即得幾點
            }
            return 1; // 一般成就得 1 點
        }

        // 計算某個成就的總最大點數
        function getAchievementMaxPoints(ach) {
            if (ach.branches && ach.branches.length > 0) {
                return 1; // 二選一分支計為 1 個進度
            }
            if (ach.stages && ach.stages.length > 0) {
                return ach.stages.length;
            }
            return 1;
        }

        // 渲染主分類 (左直欄)
        function renderCategories() {
            const container = document.getElementById('category-list');
            container.innerHTML = '';

            DEFAULT_CATEGORIES.forEach(cat => {
                const isSelected = cat.id === currentCategory;
                const countInfo = getCategoryCount(cat.id);
                
                const btnClass = isSelected
                    ? 'w-full text-left p-2 sm:p-2.5 rounded-xl bg-sky-500/10 border border-sky-500/20 text-sky-400 flex flex-col xl:flex-row xl:items-center xl:justify-between font-semibold transition-all shadow-sm'
                    : 'w-full text-left p-2 sm:p-2.5 rounded-xl text-gray-400 hover:text-gray-200 hover:bg-gray-900/60 flex flex-col xl:flex-row xl:items-center xl:justify-between transition-all';

                container.insertAdjacentHTML('beforeend', `
                    <button onclick="selectCategory('${cat.id}')" class="${btnClass} active-press">
                        <div class="flex items-center gap-1.5 min-w-0">
                            <i data-lucide="${cat.icon}" class="w-3.5 h-3.5 shrink-0"></i>
                            <span class="text-[11px] sm:text-xs tracking-wide truncate">${cat.name}</span>
                        </div>
                        <span class="text-[8px] bg-gray-950/80 px-1 py-0.5 rounded text-gray-500 font-mono mt-1 xl:mt-0 xl:ml-1 self-start xl:self-auto shrink-0">
                            ${countInfo.completed}/${countInfo.total}
                        </span>
                    </button>
                `);
            });
            lucide.createIcons();
        }

        // 渲染子分類 (右直欄)
        function renderSubCategories() {
            const container = document.getElementById('sub-category-list');
            container.innerHTML = '';

            const subList = SUB_CATEGORIES[currentCategory] || [];

            subList.forEach(sub => {
                const isSelected = sub.id === currentSubCategory;
                const countInfo = getSubCategoryCount(sub.id);

                const btnClass = isSelected
                    ? 'w-full text-left p-2 sm:p-2.5 rounded-xl bg-sky-500/20 text-sky-350 border border-sky-500/30 text-[11px] sm:text-xs font-bold transition-all flex flex-col xl:flex-row xl:items-center xl:justify-between gap-0.5'
                    : 'w-full text-left p-2 sm:p-2.5 rounded-xl bg-gray-900/40 text-gray-400 hover:text-gray-200 hover:bg-gray-850 text-[11px] sm:text-xs font-semibold transition-all flex flex-col xl:flex-row xl:items-center xl:justify-between gap-0.5';

                container.insertAdjacentHTML('beforeend', `
                    <button onclick="selectSubCategory('${sub.id}')" class="${btnClass} active-press">
                        <span class="truncate pr-1">${sub.name}</span>
                        <span class="text-[8px] font-mono opacity-60 self-start xl:self-auto shrink-0">(${countInfo.completed}/${countInfo.total})</span>
                    </button>
                `);
            });
            lucide.createIcons();
        }

        function getCategoryCount(catId) {
            let catAchievements = achievements.filter(a => a.cat === catId);
            let total = 0;
            let completed = 0;
            catAchievements.forEach(a => {
                total += getAchievementMaxPoints(a);
                completed += getAchievementPoints(a);
            });
            return { completed, total };
        }

        function getSubCategoryCount(subId) {
            let subAchievements = achievements.filter(a => a.cat === currentCategory && a.subcat === subId);
            let total = 0;
            let completed = 0;
            subAchievements.forEach(a => {
                total += getAchievementMaxPoints(a);
                completed += getAchievementPoints(a);
            });
            return { completed, total };
        }

        function selectCategory(catId) {
            currentCategory = catId;
            if (SUB_CATEGORIES[catId] && SUB_CATEGORIES[catId].length > 0) {
                currentSubCategory = SUB_CATEGORIES[catId][0].id;
            }
            renderCategories();
            renderSubCategories();
            renderAchievements();
            updateCategoryHeader();
        }

        function selectSubCategory(subId) {
            currentSubCategory = subId;
            renderSubCategories();
            renderAchievements();
            updateCategoryHeader();
        }

        // 刷新頂部分區摘要與圖標進度狀態
        function updateCategoryHeader() {
            const cat = DEFAULT_CATEGORIES.find(c => c.id === currentCategory);
            if (!cat) return;

            let titleMarkup = `<i data-lucide="${cat.icon}" class="w-5 h-5 text-sky-400"></i> ${cat.name}`;
            let descMarkup = cat.desc;

            const subList = SUB_CATEGORIES[currentCategory] || [];
            const sub = subList.find(s => s.id === currentSubCategory);
            if (sub) {
                titleMarkup = `<i data-lucide="${cat.icon}" class="w-5 h-5 text-sky-400"></i> ${cat.name} · ${sub.name}`;
                descMarkup = `正在瀏覽「${sub.name}」分區下的記錄`;
            }

            if (searchQuery !== '') {
                titleMarkup = `<i data-lucide="search" class="w-5 h-5 text-sky-400"></i> 全域搜尋結果`;
                descMarkup = `正在搜尋包含「${searchQuery}」的成就項目`;
            }

            document.getElementById('current-category-title').innerHTML = titleMarkup;
            document.getElementById('current-category-desc').innerText = descMarkup;

            let total = 0;
            let completed = 0;

            if (searchQuery !== '') {
                const searchResult = achievements.filter(a => 
                    a.title.toLowerCase().includes(searchQuery) || 
                    a.desc.toLowerCase().includes(searchQuery) ||
                    (a.stages && a.stages.some(st => st.desc.toLowerCase().includes(searchQuery) || st.title.toLowerCase().includes(searchQuery)))
                );
                searchResult.forEach(a => {
                    total += getAchievementMaxPoints(a);
                    completed += getAchievementPoints(a);
                });
            } else {
                const info = getSubCategoryCount(currentSubCategory);
                total = info.total;
                completed = info.completed;
            }

            document.getElementById('category-progress-text').innerText = `${completed} / ${total}`;
            const pct = total > 0 ? (completed / total) * 100 : 0;
            document.getElementById('category-progress-bar').style.width = `${pct}%`;
            lucide.createIcons();
        }

        function setFilter(filter) {
            currentFilter = filter;
            const filters = ['all', 'completed', 'incomplete'];
            filters.forEach(f => {
                const btn = document.getElementById(`filter-${f}`);
                if (f === filter) {
                    btn.className = "flex-1 py-1.5 text-xs font-semibold rounded-lg transition-all active-press bg-sky-500/10 text-sky-400";
                } else {
                    btn.className = "flex-1 py-1.5 text-xs font-semibold rounded-lg transition-all active-press text-gray-400 hover:text-gray-200";
                }
            });
            renderAchievements();
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase().trim();
            renderAchievements();
        });

        // 渲染右側核心成就列表
        function renderAchievements() {
            const container = document.getElementById('achievements-container');
            const emptyState = document.getElementById('empty-state');
            container.innerHTML = '';

            let filtered = achievements;

            if (searchQuery !== '') {
                filtered = achievements.filter(a => 
                    a.title.toLowerCase().includes(searchQuery) || 
                    a.desc.toLowerCase().includes(searchQuery) ||
                    (a.stages && a.stages.some(st => st.desc.toLowerCase().includes(searchQuery) || st.title.toLowerCase().includes(searchQuery))) ||
                    (a.branches && a.branches.some(br => br.title.toLowerCase().includes(searchQuery) || br.desc.toLowerCase().includes(searchQuery)))
                );
            } else {
                filtered = achievements.filter(a => a.cat === currentCategory && a.subcat === currentSubCategory);
            }

            if (currentFilter === 'completed') {
                filtered = filtered.filter(a => isAchievementFullyCompleted(a));
            } else if (currentFilter === 'incomplete') {
                filtered = filtered.filter(a => !isAchievementFullyCompleted(a));
            }

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                updateCategoryHeader();
                return;
            }
            emptyState.classList.add('hidden');

            // 實施穩定索引排序：未完成的置頂，已完成的置底
            filtered.sort((a, b) => {
                const compA = isAchievementFullyCompleted(a) ? 1 : 0;
                const compB = isAchievementFullyCompleted(b) ? 1 : 0;
                if (compA !== compB) {
                    return compA - compB;
                }
                const indexA = achievements.indexOf(a);
                const indexB = achievements.indexOf(b);
                return indexA - indexB;
            });

            filtered.forEach(ach => {
                const isCompleted = isAchievementFullyCompleted(ach);
                const isCustom = ach.id.startsWith('custom_');
                const stageIdx = getAchievementStageIndex(ach.id);
                const branchIdx = ach.branches ? getSelectedBranchIndex(ach.id) : -1;

                const hasStages = ach.stages && ach.stages.length > 0;
                const hasBranches = ach.branches && ach.branches.length > 0;
                
                let displayDesc = ach.desc;
                let displayReward = ach.reward;
                let displayTitle = ach.title;
                let stageBadgeText = '';
                let branchHtml = '';

                if (hasBranches) {
                    if (branchIdx !== -1) {
                        displayTitle = ach.branches[branchIdx].title;
                        displayDesc = ach.branches[branchIdx].desc;
                        displayReward = ach.branches[branchIdx].reward;
                    }
                    
                    branchHtml = `
                        <div class="mt-3 pt-2.5 border-t border-gray-800/40 w-full">
                            <p class="text-[10px] text-sky-450 font-bold mb-2 flex items-center gap-1">
                                <i data-lucide="git-branch" class="w-3.5 h-3.5 text-sky-400"></i> 二選一分支（完成任一即算此項達成）：
                            </p>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                ${ach.branches.map((b, idx) => {
                                    const selected = branchIdx === idx;
                                    const optClass = selected 
                                        ? 'p-2.5 bg-sky-500/10 border border-sky-500/30 rounded-lg text-left flex items-start justify-between gap-2 cursor-pointer transition-all'
                                        : 'p-2.5 bg-gray-950/60 border border-gray-850 hover:border-gray-800 rounded-lg text-left flex items-start justify-between gap-2 cursor-pointer transition-all';
                                    
                                    const radioIcon = selected ? 'circle-dot' : 'circle';
                                    const radioColor = selected ? 'text-sky-450' : 'text-gray-500 hover:text-sky-400';
                                    
                                    return `
                                        <div onclick="selectBranch('${ach.id}', ${idx})" class="${optClass}">
                                            <div class="min-w-0 flex-1">
                                                <div class="flex items-center gap-1">
                                                    <span class="text-xs font-bold text-gray-200">${b.title}</span>
                                                    <span class="text-[9px] text-amber-400 font-mono">+${b.reward}星聲</span>
                                                </div>
                                                <p class="text-[10px] text-gray-400 mt-1 leading-normal">${b.desc}</p>
                                            </div>
                                            <div class="shrink-0 mt-0.5">
                                                <span class="${radioColor}">
                                                    <i data-lucide="${radioIcon}" class="w-3.5 h-3.5"></i>
                                                </span>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                } else if (hasStages) {
                    let currentTargetStageIdx = 0;
                    if (isCompleted) {
                        currentTargetStageIdx = ach.stages.length - 1;
                    } else if (stageIdx !== -1) {
                        currentTargetStageIdx = stageIdx + 1; 
                    } else {
                        currentTargetStageIdx = 0; 
                    }

                    const targetStage = ach.stages[currentTargetStageIdx];
                    displayDesc = targetStage.desc;
                    displayReward = targetStage.reward;
                    if (targetStage.title) {
                        displayTitle = targetStage.title;
                    }
                    stageBadgeText = `[階段 ${currentTargetStageIdx + 1}/${ach.stages.length}]`;
                }

                const titleColorClass = isCompleted ? 'text-emerald-400 font-extrabold' : 'text-gray-100';

                const cardClass = isCompleted 
                    ? 'p-3 sm:p-4 bg-emerald-950/10 border-l-4 border-l-emerald-500 border-y border-r border-emerald-500/20 rounded-xl flex items-center justify-between gap-3 transition-all card-glow' 
                    : 'p-3 sm:p-4 bg-gray-900 border-l-4 border-l-gray-700 border-y border-r border-gray-850 rounded-xl flex items-center justify-between gap-3 transition-all hover:border-gray-750 card-glow';

                let checkboxIcon = 'check';
                let checkBg = 'border-gray-700 text-transparent hover:border-sky-400';
                
                if (isCompleted) {
                    checkBg = 'bg-emerald-500 border-emerald-500 text-gray-950';
                    checkboxIcon = 'check';
                } else if (stageIdx !== -1) {
                    checkBg = 'bg-sky-500/20 border-sky-400 text-sky-400';
                    checkboxIcon = 'minus';
                }

                let subCategoryBadge = '';
                if (ach.subcat) {
                    const subName = getSubCategoryName(ach.cat, ach.subcat);
                    if (subName) {
                        subCategoryBadge = `<span class="text-[8px] px-1.5 py-0.5 bg-sky-950 text-sky-400 border border-sky-500/10 rounded font-semibold">${subName}</span>`;
                    }
                }

                let noteBadge = '';
                if (ach.note) {
                    noteBadge = `<span class="text-[9px] px-1.5 py-0.5 bg-rose-500/15 text-rose-400 border border-rose-500/20 rounded font-bold">${ach.note}</span>`;
                }

                const undoButton = (hasStages && stageIdx !== -1) ? `
                    <button onclick="undoAchievementStage('${ach.id}')" class="p-1.5 text-gray-500 hover:text-sky-400 hover:bg-gray-850 rounded transition-all active-press" title="退回上一階段">
                        <i data-lucide="corner-up-left" class="w-3.5 h-3.5"></i>
                    </button>
                ` : '';

                container.insertAdjacentHTML('beforeend', `
                    <div class="${cardClass} flex-col !items-start" id="ach-card-${ach.id}">
                        <div class="flex items-center justify-between w-full gap-3">
                            <div class="flex items-start gap-3 min-w-0 flex-1">
                                <div class="flex items-center justify-center p-1 -m-1">
                                    <button onclick="toggleAchievement('${ach.id}')" class="w-6 h-6 shrink-0 rounded-md border-2 ${checkBg} flex items-center justify-center transition-all cursor-pointer active-press" title="${hasStages ? '點擊推進階段' : hasBranches ? '點擊完成/取消分支' : '點擊完成'}">
                                        <i data-lucide="${checkboxIcon}" class="w-4 h-4 font-bold"></i>
                                    </button>
                                </div>
                                <div class="min-w-0 flex-1">
                                    <div class="flex items-center gap-1.5 flex-wrap">
                                        <h4 class="text-xs sm:text-sm font-bold ${titleColorClass}">${displayTitle}</h4>
                                        ${stageBadgeText ? `<span class="text-[9px] px-1.5 py-0.5 bg-amber-500/10 text-amber-400 rounded font-bold">${stageBadgeText}</span>` : ''}
                                        ${noteBadge}
                                        ${isCustom ? '<span class="text-[8px] px-1.5 py-0.5 bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 rounded font-semibold">自訂</span>' : ''}
                                        <span class="text-[8px] px-1.5 py-0.5 bg-gray-800 text-gray-400 rounded font-semibold">
                                            ${getCategoryName(ach.cat)}
                                        </span>
                                        ${subCategoryBadge}
                                    </div>
                                    <p class="text-[11px] sm:text-xs text-gray-400 mt-1.5 leading-relaxed pr-2">${displayDesc}</p>
                                </div>
                            </div>

                            <div class="flex items-center gap-2 shrink-0">
                                ${undoButton}
                                <div class="bg-amber-500/10 border border-amber-500/20 rounded-lg px-2 py-1 flex items-center gap-1">
                                    <i data-lucide="sparkles" class="w-3 h-3 text-amber-400"></i>
                                    <span class="text-[10px] sm:text-xs font-bold text-amber-300 font-mono">${displayReward}</span>
                                </div>
                                
                                ${isCustom ? `
                                    <button onclick="deleteCustomAchievement('${ach.id}')" class="p-2 text-gray-500 hover:text-rose-400 rounded-lg hover:bg-rose-500/10 transition-all active-press">
                                        <i data-lucide="trash" class="w-4 h-4"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                        ${branchHtml}
                    </div>
                `);
            });

            container.scrollTop = 0;
            updateCategoryHeader();
            lucide.createIcons();
        }

        // 成就勾選切換與階段推進邏輯
        function toggleAchievement(id) {
            const ach = achievements.find(a => a.id === id);
            if (!ach) return;

            const hasStages = ach.stages && ach.stages.length > 0;
            const hasBranches = ach.branches && ach.branches.length > 0;
            const currentIdx = getAchievementStageIndex(id);

            if (hasBranches) {
                const currentBranch = getSelectedBranchIndex(id);
                if (currentBranch === -1) {
                    selectBranch(id, 0); // 預設選中第一個分支
                } else {
                    completedIds = completedIds.filter(x => !(x && x.id === id));
                    showToast("已取消選擇分支成就", "info");
                    saveState();
                    renderCategories();
                    renderSubCategories();
                    renderAchievements();
                }
                return;
            }

            if (hasStages) {
                if (currentIdx === -1) {
                    completedIds.push({ id: id, currentStage: 0 });
                    showToast(`階段 1 已達成！推進至第 2 階段 ✨`, "success");
                } else if (currentIdx < ach.stages.length - 1) {
                    const nextStage = currentIdx + 1;
                    completedIds = completedIds.map(x => {
                        if (x && x.id === id) {
                            return { id: id, currentStage: nextStage };
                        }
                        return x;
                    });
                    
                    if (nextStage === ach.stages.length - 1) {
                        showToast(`恭喜完成最終階段！成就完全解鎖！🏆`, "success");
                    } else {
                        showToast(`階段 ${nextStage + 1} 已達成！繼續努力 🚀`, "success");
                    }
                } else {
                    completedIds = completedIds.filter(x => !(x === id || (x && x.id === id)));
                    showToast("已重置該階段成就進度", "info");
                }
            } else {
                const index = completedIds.findIndex(x => x === id || (x && x.id === id));
                if (index > -1) {
                    completedIds.splice(index, 1);
                    showToast("已取消完成狀態", "info");
                } else {
                    completedIds.push(id);
                    showToast("恭喜達成成就！✨", "success");
                }
            }

            saveState();
            renderCategories();
            renderSubCategories();
            renderAchievements();
        }

        function undoAchievementStage(id) {
            const currentIdx = getAchievementStageIndex(id);
            if (currentIdx === -1) return;

            if (currentIdx === 0) {
                completedIds = completedIds.filter(x => !(x === id || (x && x.id === id)));
                showToast("已退回至初始未完成狀態", "info");
            } else {
                completedIds = completedIds.map(x => {
                    if (x && x.id === id) {
                        return { id: id, currentStage: currentIdx - 1 };
                    }
                    return x;
                });
                showToast(`已退回到階段 ${currentIdx}`, "info");
            }

            saveState();
            renderCategories();
            renderSubCategories();
            renderAchievements();
        }

        // 分支成就選擇邏輯 (二選一)
        function selectBranch(id, branchIdx) {
            const ach = achievements.find(a => a.id === id);
            if (!ach) return;

            const currentBranch = getSelectedBranchIndex(id);

            if (currentBranch === branchIdx) {
                completedIds = completedIds.filter(x => !(x && x.id === id));
                showToast("已取消選擇分支成就", "info");
            } else {
                // 清理可能重複的本項目，然後推進選定分支
                completedIds = completedIds.filter(x => !(x && x.id === id));
                completedIds.push({ id: id, selectedBranch: branchIdx });
                showToast(`已達成分支成就：${ach.branches[branchIdx].title}！✨`, "success");
            }

            saveState();
            renderCategories();
            renderSubCategories();
            renderAchievements();
        }

        function getCategoryName(catId) {
            const cat = DEFAULT_CATEGORIES.find(c => c.id === catId);
            return cat ? cat.name : "未知";
        }

        function getSubCategoryName(catId, subId) {
            if (!SUB_CATEGORIES[catId]) return "";
            const sub = SUB_CATEGORIES[catId].find(s => s.id === subId);
            return sub ? sub.name : "";
        }

        // 更新全局與大分區的進度條數據與星聲統計
        function updateProgress() {
            let total = 0;
            let completed = 0;

            achievements.forEach(ach => {
                total += getAchievementMaxPoints(ach);
                completed += getAchievementPoints(ach);
            });

            const progressPct = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('global-progress-text').innerText = `${progressPct}% (${completed}/${total})`;
            document.getElementById('global-progress-bar').style.width = `${progressPct}%`;

            let astriteGained = 0;
            let astriteRemaining = 0;

            achievements.forEach(ach => {
                const stageIdx = getAchievementStageIndex(ach.id);
                const branchIdx = ach.branches ? getSelectedBranchIndex(ach.id) : -1;
                const hasStages = ach.stages && ach.stages.length > 0;
                const hasBranches = ach.branches && ach.branches.length > 0;

                if (hasBranches) {
                    if (branchIdx !== -1) {
                        astriteGained += ach.branches[branchIdx].reward;
                    } else {
                        astriteRemaining += ach.reward; // 預設未拿到主任務代表的 5 星聲
                    }
                } else if (hasStages) {
                    ach.stages.forEach((st, idx) => {
                        if (stageIdx >= idx) {
                            astriteGained += st.reward;
                        } else {
                            astriteRemaining += st.reward;
                        }
                    });
                } else {
                    if (stageIdx !== -1) {
                        astriteGained += ach.reward;
                    } else {
                        astriteRemaining += ach.reward;
                    }
                }
            });

            document.getElementById('total-astrite-gained').innerHTML = `
                <i data-lucide="sparkles" class="w-3 h-3 text-amber-400"></i> 已拿星聲: ${astriteGained}
            `;
            document.getElementById('total-astrite-remaining').innerText = `未拿星聲: ${astriteRemaining}`;
            lucide.createIcons();
        }

        function toggleUtilityMenu() {
            const menu = document.getElementById('utility-menu');
            menu.classList.toggle('hidden');
        }

        window.addEventListener('click', (e) => {
            const menu = document.getElementById('utility-menu');
            const btn = menu.previousElementSibling || menu.parentElement;
            if (!menu.classList.contains('hidden') && !menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.add('hidden');
            }
        });

        // 填充自訂成就大類
        function populateCategorySelect() {
            const select = document.getElementById('custom-category');
            select.innerHTML = '';
            DEFAULT_CATEGORIES.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.id;
                opt.text = cat.name;
                select.appendChild(opt);
            });
            onModalCategoryChange();
        }

        // 大類子選單二級聯動
        function onModalCategoryChange() {
            const catSelect = document.getElementById('custom-category');
            const subcatWrapper = document.getElementById('custom-subcat-wrapper');
            const subcatSelect = document.getElementById('custom-subcategory');

            const selectedCat = catSelect.value;
            const subList = SUB_CATEGORIES[selectedCat] || [];

            if (subList.length > 0) {
                subcatWrapper.classList.remove('hidden');
                subcatSelect.innerHTML = '';
                subList.forEach(sub => {
                    const opt = document.createElement('option');
                    opt.value = sub.id;
                    opt.text = sub.name;
                    subcatSelect.appendChild(opt);
                });
            } else {
                subcatWrapper.classList.add('hidden');
            }
        }

        function openAddModal() {
            document.getElementById('add-modal').classList.remove('hidden');
        }
        function closeAddModal() {
            document.getElementById('add-modal').classList.add('hidden');
            document.getElementById('add-achievement-form').reset();
            onModalCategoryChange();
        }

        // 處理並保存玩家在 UI 新增的自定義成就
        function saveCustomAchievement(event) {
            event.preventDefault();
            const title = document.getElementById('custom-title').value.trim();
            const desc = document.getElementById('custom-description').value.trim() || '無描述條件';
            const reward = parseInt(document.getElementById('custom-reward').value);
            const cat = document.getElementById('custom-category').value;
            const subcat = document.getElementById('custom-subcategory').value;

            if (!title) return;

            const newAch = {
                id: `custom_${Date.now()}`,
                cat,
                subcat,
                title,
                desc,
                reward
            };

            achievements.push(newAch);
            saveState();
            closeAddModal();

            selectCategory(cat);
            selectSubCategory(subcat);
            showToast(`已新增成就：${title}`, "success");
        }

        function deleteCustomAchievement(id) {
            achievements = achievements.filter(a => a.id !== id);
            completedIds = completedIds.filter(x => !(x === id || (x && x.id === id)));
            saveState();
            renderCategories();
            renderSubCategories();
            renderAchievements();
            showToast("已刪除自訂項目", "info");
        }

        // 導出 JSON 備份
        function exportData() {
            const dataStr = JSON.stringify({
                completedIds: completedIds,
                customAchievements: achievements.filter(a => a.id.startsWith('custom_'))
            }, null, 2);

            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `ww_ach_backup_${new Date().toISOString().slice(0, 10)}.json`;
            link.click();
            URL.revokeObjectURL(url);
            showToast("備份資料導出成功！", "success");
        }

        function triggerImport() {
            document.getElementById('import-file').click();
        }

        // 匯入與解析 JSON 數據
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported.completedIds)) {
                        completedIds = imported.completedIds;
                    }
                    if (Array.isArray(imported.customAchievements)) {
                        achievements = [...DEFAULT_ACHIEVEMENTS, ...imported.customAchievements];
                    }
                    saveState();
                    renderCategories();
                    renderSubCategories();
                    renderAchievements();
                    showToast("備份資料匯入成功！", "success");
                } catch (err) {
                    showToast("無效的備份檔案格式", "error");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // 確認重置 Modal
        function openConfirmModal() {
            document.getElementById('confirm-modal').classList.remove('hidden');
        }
        function closeConfirmModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
        }
        function executeReset() {
            completedIds = [];
            achievements = [...DEFAULT_ACHIEVEMENTS];
            saveState();
            closeConfirmModal();
            selectCategory("sol3");
            showToast("手冊已完全恢復初始狀態", "info");
        }

        // 渲染精美的系統提示通知
        function showToast(message, type = "info") {
            const alertBox = document.getElementById('custom-alert');
            const msgSpan = document.getElementById('alert-message');
            const iconContainer = document.getElementById('alert-icon-container');

            msgSpan.innerText = message;

            if (type === "success") {
                iconContainer.className = "text-emerald-400 shrink-0";
                iconContainer.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5"></i>';
                alertBox.className = "fixed top-6 right-4 left-4 sm:left-auto max-w-sm sm:w-80 bg-gray-900 border border-emerald-500/30 text-gray-200 px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 z-50 animate-bounce";
            } else if (type === "error") {
                iconContainer.className = "text-rose-400 shrink-0";
                iconContainer.innerHTML = '<i data-lucide="alert-circle" class="w-5 h-5"></i>';
                alertBox.className = "fixed top-6 right-4 left-4 sm:left-auto max-w-sm sm:w-80 bg-gray-900 border border-rose-500/30 text-gray-200 px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 z-50 animate-bounce";
            } else {
                iconContainer.className = "text-sky-400 shrink-0";
                iconContainer.innerHTML = '<i data-lucide="info" class="w-5 h-5"></i>';
                alertBox.className = "fixed top-6 right-4 left-4 sm:left-auto max-w-sm sm:w-80 bg-gray-900 border border-sky-500/30 text-gray-200 px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 z-50 animate-bounce";
            }

            lucide.createIcons();
            alertBox.classList.remove('hidden');

            setTimeout(() => {
                alertBox.classList.add('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
