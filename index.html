                "八方藏品‧一",
                "釣魚宗師‧一",
                "獵食達人‧一",
                "荒野獵人‧一",
                "黃金礦工‧一",
                "一劑見效‧一",
                "用料理帶來幸福‧一",
                "創意工坊‧一",
                "索拉風光‧拉古那‧一"
            ];
            if (threeStageTasks.includes(taskName)) return 3;
            
            if (taskName === "市民的好鄰居‧一") return 3;
            if (taskName === "輕舟已過萬重山‧一") return 3;
            if (taskName === "群星閃耀時‧一") return 3;
            if (taskName === "漂泊藥師的呢喃之語‧一") return 2;
            if (taskName.includes('墨麒麟')) return 2;
            if (taskName.includes('存在的視界線')) return 3; 
            if (taskName.includes('嗯……實用主義至上!')) return 3;
            if (taskName.includes('目標是聲骸愛好者!')) return 3;
            if (taskName.includes('奇妙的化學反應')) return 3;
            if (taskName.includes('金色傳說')) return 3;
            if (taskName.includes('蝴蝶效應')) return 3;
            if (taskName.includes('焚骸調音') || taskName.includes('往日之音')) return 3;
            return 1;
        }

        function getTotalStats() {
            let totalDone = 0;
            let totalCount = 0;
            questData.forEach(cat => {
                cat.subItems.forEach(sub => {
                    sub.tasks.forEach(t => {
                        const limit = getLimit(t);
                        totalCount += limit;
                        totalDone += Math.min(progress[t] || 0, limit);
                    });
                });
            });
            return { totalDone, totalCount };
        }

        function calculateCategoryProgress(category) {
            let current = 0;
            let total = 0;
            category.subItems.forEach(sub => {
                sub.tasks.forEach(t => {
                    const limit = getLimit(t);
                    total += limit;
                    current += Math.min(progress[t] || 0, limit);
                });
            });
            return { current, total };
        }

        function calculateSubProgress(sub) {
            let current = 0;
            let total = 0;
            sub.tasks.forEach(t => {
                const limit = getLimit(t);
                total += limit;
                current += Math.min(progress[t] || 0, limit);
            });
            return { current, total };
        }

        function renderApp() {
            const container = document.getElementById('app');
            const stats = getTotalStats();
            document.getElementById('totalProgress').innerText = `已達成：${stats.totalDone} / ${stats.totalCount}`;
            
            container.innerHTML = '';
            
            questData.forEach((cat, cIdx) => {
                const section = document.createElement('div');
                section.id = `section-${cIdx}`;
                section.className = "bg-gray-800 rounded-lg shadow-lg border border-gray-700 overflow-hidden";
                const isSectionOpen = (activeSection === cIdx);
                const catProg = calculateCategoryProgress(cat);
                
                let subHtml = cat.subItems.map((sub, sIdx) => {
                    const isOpen = (openSubSections[cIdx] === sIdx);
                    const subProg = calculateSubProgress(sub);
                    const progressText = sub.tasks.length > 0 ? `<span class="text-xs bg-amber-900/50 px-2 py-0.5 rounded text-amber-200">${subProg.current}/${subProg.total}</span>` : '';
                    
                    return `
                    <div class="border-t border-gray-700" id="sub-${cIdx}-${sIdx}">
                        <button onclick="toggleSub(${cIdx}, ${sIdx})" class="w-full p-4 text-left text-base font-bold text-gray-300 flex justify-between items-center bg-gray-900/30">
                            <span>${sub.name} ${progressText}</span>
                            ${sub.tasks.length > 0 ? (isOpen ? '▼' : '▶') : ''}
                        </button>
                        ${sub.tasks.length > 0 ? `
                            <ul class="${isOpen ? '' : 'hidden'} p-2 bg-gray-900/60">
                                ${sub.tasks.map(t => {
                                    const limit = getLimit(t);
                                    const isDone = (progress[t] || 0) >= limit;
                                    const currentTaskName = getTaskLabel(t, progress[t] || 0, limit);
                                    return `
                                        <li class="p-3 flex items-center justify-between border-b border-gray-800 last:border-0">
                                            <span class="${isDone ? 'completed' : 'text-amber-300'} text-sm">· ${currentTaskName}</span>
                                            <button onclick="advanceTask('${t}', ${limit})" class="ml-4 px-6 py-3 bg-amber-600 rounded-lg text-white font-bold text-sm active:scale-95 transition-transform touch-manipulation">
                                                ${isDone ? '重置' : '進度'}
                                            </button>
                                        </li>
                                    `;
                                }).join('')}
                            </ul>
                        ` : ''}
                    </div>
                `}).join('');

                section.innerHTML = `
                    <button onclick="toggleSection(${cIdx})" class="w-full p-5 text-left font-bold text-lg text-amber-400 flex justify-between items-center border-b border-gray-700">
                        ${cat.category} <span class="text-sm text-gray-400">${catProg.current}/${catProg.total}</span>
                    </button>
                    <div class="${isSectionOpen ? '' : 'hidden'}">${subHtml}</div>
                `;
                container.appendChild(section);
            });
        }

        function getTaskLabel(baseName, level, limit) {
            // 定義需要精確三階段處理的項目
            const threeStageTasks = [
                "八方藏品‧一",
                "釣魚宗師‧一",
                "獵食達人‧一",
                "荒野獵人‧一",
                "黃金礦工‧一",
                "一劑見效‧一",
                "用料理帶來幸福‧一",
                "創意工坊‧一",
                "索拉風光‧拉古那‧一"
            ];

            if (threeStageTasks.includes(baseName)) {
                if (level === 0) return baseName;
                if (level === 1) return baseName.replace('‧一', '‧二');
                if (level >= 2) return baseName.replace('‧一', '‧三');
            }

            // 特殊邏輯
            if (baseName === "漂泊藥師的呢喃之語‧一") {
                if (level >= 1) return "漂泊藥師的呢喃之語‧二";
            }
            if (baseName === "墨麒麟1星主廚") {
                if (level >= 1) return "墨麒麟2星主廚";
            }
            if (baseName.includes('存在的視界線')) {
                if (level === 0) return "存在的視界線 (階段一)";
                if (level === 1) return "存在的視界線 (階段二)";
                if (level >= 2) return "存在的視界線 (階段三)";
            }
            if (baseName.includes('嗯……實用主義至上!')) {
                if (level === 0) return "嗯……實用主義至上!";
                if (level === 1) return "見到你，很高興";
                if (level >= 2) return "你就是我的Servant嗎?";
            }
            if (baseName.includes('目標是聲骸愛好者!')) {
                if (level === 0) return "目標是聲骸愛好者!";
                if (level === 1) return "目標是聲骸大師!";
                if (level >= 2) return "目標是聲骸宗師!";
            }
            if (baseName.includes('奇妙的化學反應')) {
                if (level === 0) return "奇妙的化學反應";
                if (level === 1) return "意念合一";
                if (level >= 2) return "這就是我們的羈絆!";
            }
            return baseName;
        }

        function advanceTask(taskName, limit) {
            progress[taskName] = (progress[taskName] || 0) + 1;
            if (progress[taskName] > limit) progress[taskName] = 0;
            localStorage.setItem('questProgress', JSON.stringify(progress));
            renderApp();
        }

        function toggleSection(idx) {
            activeSection = (activeSection === idx) ? null : idx;
            renderApp();
            if (activeSection !== null) {
                setTimeout(() => {
                    document.getElementById(`section-${idx}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 50);
            }
        }

        function toggleSub(cIdx, sIdx) {
            if (openSubSections[cIdx] === sIdx) {
                delete openSubSections[cIdx];
            } else {
                openSubSections[cIdx] = sIdx;
            }
            renderApp();
            if (openSubSections[cIdx] === sIdx) {
                setTimeout(() => {
                    document.getElementById(`sub-${cIdx}-${sIdx}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 50);
            }
        }

        window.onload = renderApp;
    </script>
